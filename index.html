<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charles Valentin — UX/UI React</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Helvetica Neue', 'sans-serif'] },
                    colors: { accent: '#e0ff00', borderDark: '#333' }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;800;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #1C1C1C; color: #fff; overflow-x: hidden; }
        .marquee-container { overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .text-outline { color: transparent; -webkit-text-stroke: 2px #fff; }

        .project-row { position: relative; overflow: hidden; }
        .project-row::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff; transform: scaleY(0); transform-origin: bottom;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 0;
        }
        .project-row:hover::before, .project-row.is-active::before { transform: scaleY(1); transform-origin: top; }
        
        .project-row-content { position: relative; z-index: 1; transition: transform 0.4s ease; }
        .project-row:hover .project-row-content, .project-row.is-active .project-row-content { transform: translateX(2vw); color: #000; }

        .project-title-wrapper { perspective: 1000px; }
        .char { display: inline-block; transform-style: preserve-3d; transform-origin: center center; }
        .word { display: inline-block; white-space: nowrap; } 
        
        ::placeholder { color: #666; }

        .nav-project-btn:hover .arrow-icon { transform: translateX(10px); }
        .nav-project-btn.prev:hover .arrow-icon { transform: translateX(-10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        gsap.registerPlugin(ScrollTrigger);

        const projectsData = {

                approach: "Création d'un univers visuel premium (mobile-first) reflétant le positionnement haut de gamme.",
                images: ["assets/clinique-champs-elysees/cover.png", "assets/clinique-champs-elysees/screen-desktop-3.png", "assets/clinique-champs-elysees/screen-desktop.png", "assets/clinique-champs-elysees/screen-desktop-2.png"],

        /**
         * Composant de Formulaire de Contact Réutilisable
         */
        function ContactSection() {
            const sectionRef = useRef();
            const [status, setStatus] = useState(""); // "", "SENDING", "SUCCESS", "ERROR"

            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.from(".contact-reveal", {
                        scrollTrigger: {
                            trigger: sectionRef.current,
                            start: "top 80%",
                        },
                        y: 50,
                        opacity: 0,
                        duration: 1,
                        stagger: 0.2,
                        ease: "power3.out"
                    });
                }, sectionRef);
                return () => ctx.revert();
            }, []);

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                const formData = new FormData(form);
                
                // 1. Validation de l'email via Regex
                const email = formData.get("email");
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    alert("Veuillez entrer une adresse email valide.");
                    return;
                }

                setStatus("SENDING");

                try {
                    // 2. Envoi via Fetch vers Formspree
                    // REMPLACE 'votre_id_formspree' par l'ID que tu recevras sur ton compte
                    const response = await fetch("https://formspree.io/f/mqedrwer", {
                        method: "POST",
                        body: formData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });

                    if (response.ok) {
                        setStatus("SUCCESS");
                        form.reset();
                        // Reset du message de succès après 5 secondes
                        setTimeout(() => setStatus(""), 5000);
                    } else {
                        const data = await response.json();
                        console.error(data);
                        setStatus("ERROR");
                    }
                } catch (error) {
                    console.error(error);
                    setStatus("ERROR");
                }
            };

            return (
                <footer ref={sectionRef} className="py-24 md:py-40 px-6 max-w-5xl mx-auto">
                    <h2 className="contact-reveal text-[10vw] font-black uppercase leading-[0.85] tracking-tighter mb-16 text-center">
                        START A<br/><span className="text-accent">PROJECT.</span>
                    </h2>

                    <form onSubmit={handleFormSubmit} className="contact-reveal flex flex-col gap-10">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <input 
                                type="text" 
                                name="name" 
                                placeholder="VOTRE NOM" 
                                required 
                                className="w-full bg-transparent border-b-2 border-borderDark py-4 text-xl md:text-2xl font-bold uppercase tracking-wide focus:outline-none focus:border-accent transition-colors" 
                            />
                            <input 
                                type="email" 
                                name="email" 
                                placeholder="VOTRE EMAIL" 
                                required 
                                className="w-full bg-transparent border-b-2 border-borderDark py-4 text-xl md:text-2xl font-bold uppercase tracking-wide focus:outline-none focus:border-accent transition-colors" 
                            />
                        </div>
                        <textarea 
                            name="message" 
                            placeholder="VOTRE MESSAGE" 
                            required 
                            rows="3" 
                            className="w-full bg-transparent border-b-2 border-borderDark py-4 text-xl md:text-2xl font-bold uppercase tracking-wide focus:outline-none focus:border-accent transition-colors resize-none"
                        ></textarea>
                        
                        <div className="flex flex-col md:items-end gap-4">
                            <button 
                                type="submit" 
                                disabled={status === "SENDING"}
                                className={`mt-8 border-2 border-white py-6 px-12 text-2xl font-black uppercase tracking-tighter transition-all duration-300 ${status === "SENDING" ? 'opacity-50 cursor-not-allowed' : 'hover:bg-white hover:text-black'}`}
                            >
                                {status === "SENDING" ? "ENVOI EN COURS..." : "ENVOYER"}
                            </button>

                            {/* Messages de feedback */}
                            {status === "SUCCESS" && (
                                <p className="text-accent font-bold uppercase tracking-widest animate-pulse">
                                    ✓ Message envoyé avec succès !
                                </p>
                            )}
                            {status === "ERROR" && (
                                <p className="text-red-500 font-bold uppercase tracking-widest">
                                    ✕ Une erreur est survenue. Réessayez.
                                </p>
                            )}
                        </div>
                    </form>
                </footer>
            );
        }

        function ProjectNavigation({ currentId, onNavigate }) {
            const ids = Object.keys(projectsData);
            const currentIndex = ids.indexOf(currentId);
            const prevId = currentIndex > 0 ? ids[currentIndex - 1] : null;
            const nextId = currentIndex < ids.length - 1 ? ids[currentIndex + 1] : null;

            if (!prevId && !nextId) return null;

            return (
                <nav className="grid grid-cols-1 md:grid-cols-2 border-t border-b border-borderDark mt-0">
                    <div className={`group p-8 md:p-16 border-b md:border-b-0 md:border-r border-borderDark flex flex-col justify-center transition-colors hover:bg-white/5 cursor-pointer ${!prevId ? 'opacity-20 cursor-not-allowed' : ''}`}
                         onClick={() => prevId && onNavigate(prevId)}>
                        {prevId && (
                            <div className="nav-project-btn prev">
                                <span className="text-xs font-bold uppercase tracking-widest text-neutral-500 mb-4 block">Projet Précédent</span>
                                <div className="flex items-center gap-4">
                                    <span className="arrow-icon transition-transform duration-300 text-3xl text-accent">←</span>
                                    <h4 className="text-2xl md:text-4xl font-black uppercase tracking-tighter group-hover:text-accent transition-colors">
                                        {projectsData[prevId].title}
                                    </h4>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className={`group p-8 md:p-16 flex flex-col justify-center items-end text-right transition-colors hover:bg-white/5 cursor-pointer ${!nextId ? 'opacity-20 cursor-not-allowed' : ''}`}
                         onClick={() => nextId && onNavigate(nextId)}>
                        {nextId && (
                            <div className="nav-project-btn">
                                <span className="text-xs font-bold uppercase tracking-widest text-neutral-500 mb-4 block">Projet Suivant</span>
                                <div className="flex items-center justify-end gap-4">
                                    <h4 className="text-2xl md:text-4xl font-black uppercase tracking-tighter group-hover:text-accent transition-colors">
                                        {projectsData[nextId].title}
                                    </h4>
                                    <span className="arrow-icon transition-transform duration-300 text-3xl text-accent">→</span>
                                </div>
                            </div>
                        )}
                    </div>
                </nav>
            );
        }

        function LandingPage({ onOpenProject }) {
            const containerRef = useRef();

            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.from(".gsap-fade-up", {
                        y: 100, opacity: 0, duration: 1, stagger: 0.1, ease: "power4.out", delay: 0.2
                    });

                    gsap.utils.toArray('.gsap-project-row').forEach((row) => {
                        gsap.from(row, {
                            scrollTrigger: {
                                trigger: row, start: "top 95%", toggleActions: "play none none reverse"
                            },
                            opacity: 0, x: -50, duration: 0.6, ease: "power3.out"
                        });
                    });
                }, containerRef);

                let mobileCleanup = null;
                if (window.innerWidth < 768) {
                    const rows = Array.from(containerRef.current.querySelectorAll('.gsap-project-row'));
                    let activeRow = null;
                    let ticking = false;

                    const checkActive = () => {
                        const centerY = window.innerHeight / 2;
                        let closestRow = null;
                        let closestDist = Infinity;

                        rows.forEach(row => {
                            const rect = row.getBoundingClientRect();
                            const dist = Math.abs((rect.top + rect.height / 2) - centerY);
                            if (dist < closestDist) { closestDist = dist; closestRow = row; }
                        });

                        if (closestRow !== activeRow) {
                            if (activeRow) {
                                activeRow.classList.remove('is-active');
                                gsap.to(activeRow.querySelectorAll('.char'), { rotateX: 0, duration: 0.3, ease: "power2.out", overwrite: true });
                            }
                            activeRow = closestRow;
                            if (closestRow) {
                                closestRow.classList.add('is-active');
                                gsap.to(closestRow.querySelectorAll('.char'), { rotateX: 360, duration: 0.6, stagger: 0.02, ease: "back.out(1.5)", overwrite: true });
                            }
                        }
                        ticking = false;
                    };

                    const onScroll = () => {
                        if (!ticking) { requestAnimationFrame(checkActive); ticking = true; }
                    };

                    window.addEventListener('scroll', onScroll, { passive: true });
                    checkActive();
                    mobileCleanup = () => window.removeEventListener('scroll', onScroll);
                }

                return () => { ctx.revert(); if (mobileCleanup) mobileCleanup(); };
            }, []);

            const handleMouseEnter = (e) => {
                if (window.innerWidth >= 768) {
                    const chars = e.currentTarget.querySelectorAll('.char');
                    gsap.to(chars, { rotateX: 360, duration: 0.6, stagger: 0.03, ease: "back.out(1.5)", overwrite: "auto" });
                }
            };

            const handleMouseLeave = (e) => {
                if (window.innerWidth >= 768) {
                    const chars = e.currentTarget.querySelectorAll('.char');
                    gsap.to(chars, { rotateX: 0, duration: 0.4, ease: "power2.out", overwrite: "auto" });
                }
            };

            return (
                <div ref={containerRef} className="pb-20">
                    <header className="border-b border-borderDark py-10 md:py-20 marquee-container gsap-fade-up">
                        <div className="marquee-content whitespace-nowrap">
                            <span className="text-[12vw] font-black uppercase leading-[0.8] tracking-tighter pr-8">
                                UX/UI DESIGNER <span className="text-outline">CREATIVE</span>
                            </span>
                            <span className="text-[12vw] font-black uppercase leading-[0.8] tracking-tighter pr-8">
                                UX/UI DESIGNER <span className="text-outline">CREATIVE</span>
                            </span>
                        </div>
                    </header>

                    <section className="grid grid-cols-1 md:grid-cols-3 gap-8 p-6 md:p-16 border-b border-borderDark">
                        <div className="text-sm text-neutral-500 uppercase font-medium gsap-fade-up">Mission</div>
                        <div className="md:col-span-2 text-2xl md:text-5xl font-medium leading-tight tracking-tight gsap-fade-up">
                            Je conçois des expériences digitales <span className="text-accent">innovantes</span>, fonctionnelles et centrées sur l'utilisateur. Transformer des problématiques complexes en interfaces évidentes.
                        </div>
                    </section>

                    <main className="flex flex-col">
                        {Object.entries(projectsData).map(([id, project]) => (
                            <article 
                                key={id} 
                                onClick={() => onOpenProject(id)}
                                onMouseEnter={handleMouseEnter}
                                onMouseLeave={handleMouseLeave}
                                className="project-row border-b border-borderDark cursor-pointer gsap-project-row"
                            >
                                <div className="project-row-content flex flex-col md:flex-row justify-between md:items-center p-6 md:p-12 gap-4">
                                    <h2 className="text-4xl md:text-[6vw] font-black uppercase tracking-tighter m-0 leading-[0.9] md:leading-none project-title-wrapper flex flex-wrap gap-x-[0.2em]">
                                        {project.title.split(' ').map((word, wIndex) => (
                                            <span key={wIndex} className="word">
                                                {word.split('').map((char, cIndex) => (
                                                    <span key={cIndex} className="char">{char}</span>
                                                ))}
                                            </span>
                                        ))}
                                    </h2>
                                    <div className="text-sm md:text-base font-medium uppercase text-left md:text-right text-neutral-400 shrink-0">
                                        {project.year}<br/>{project.tags}
                                    </div>
                                </div>
                            </article>
                        ))}
                    </main>

                    {/* Utilisation du composant ContactSection sur l'accueil */}
                    <ContactSection />
                </div>
            );
        }

        function ProjectView({ project, projectId, onNavigate, onClose }) {
            const containerRef = useRef();

            useLayoutEffect(() => {
                window.scrollTo(0, 0);
                const ctx = gsap.context(() => {
                    gsap.from(".proj-reveal", {
                        y: 50, opacity: 0, duration: 0.8, stagger: 0.1, ease: "power3.out"
                    });
                    
                    gsap.utils.toArray('.proj-img').forEach(img => {
                        gsap.fromTo(img, 
                            { scale: 1.1, opacity: 0 },
                            {
                                scale: 1, opacity: 1, duration: 1.5, ease: "power2.out",
                                scrollTrigger: { trigger: img, start: "top 80%" }
                            }
                        );
                    });
                }, containerRef);
                return () => ctx.revert();
            }, [project]);

            if (!project) return null;

            return (
                <div ref={containerRef} className="min-h-screen bg-[#1C1C1C]">
                    <button onClick={onClose} className="sticky top-0 z-50 mix-blend-difference bg-transparent text-white font-black uppercase text-xl p-6 md:p-10 hover:text-accent transition-colors flex items-center gap-4">
                        <span>←</span> RETOUR
                    </button>

                    <div className="px-6 md:px-12 pb-12 border-b border-borderDark proj-reveal">
                        <h1 className="text-[12vw] font-black uppercase leading-[0.9] md:leading-[0.85] tracking-tighter mb-6 flex flex-wrap gap-x-[0.3em]">
                            {project.title.split(' ').map((word, wIndex) => (
                                <span key={wIndex} className="inline-block whitespace-nowrap">
                                    {word}
                                </span>
                            ))}
                        </h1>
                        <div className="text-lg md:text-2xl font-medium text-neutral-500 uppercase">{project.headerTags}</div>
                    </div>

                    {project.images && project.images[0] && (
                        <div className="p-6 md:p-12 border-b border-borderDark bg-[#1C1C1C] overflow-hidden">
                            <img src={project.images[0]} alt={project.title} className="w-full proj-img" />
                        </div>
                    )}

                    <div className="grid md:grid-cols-2 border-b border-borderDark">
                        <div className="p-6 md:p-12 border-b md:border-b-0 md:border-r border-borderDark proj-reveal">
                            <h3 className="text-2xl font-black uppercase mb-4">Le Contexte</h3>
                            <p className="text-lg md:text-xl text-neutral-400 leading-relaxed">{project.context}</p>
                        </div>
                        <div className="p-6 md:p-12 proj-reveal">
                            <h3 className="text-2xl font-black uppercase mb-4">L'Approche</h3>
                            <p className="text-lg md:text-xl text-neutral-400 leading-relaxed">{project.approach}</p>
                        </div>
                    </div>

                    {project.images && project.images.slice(1).map((imgSrc, index) => (
                        <React.Fragment key={index}>
                            <div className="p-6 md:p-12 border-b border-borderDark bg-[#1C1C1C] overflow-hidden">
                                <img src={imgSrc} alt={`${project.title} aperçu ${index + 1}`} className="w-full bg-[#1C1C1C] proj-img" />
                            </div>
                            
                            {project.descriptions && project.descriptions[index] && (
                                <div className="px-6 md:px-12 py-12 md:py-20 border-b border-borderDark bg-[#1C1C1C] proj-reveal">
                                    <p className="text-lg md:text-xl text-neutral-400 leading-relaxed max-w-5xl">
                                        {project.descriptions[index]}
                                    </p>
                                </div>
                            )}
                        </React.Fragment>
                    ))}

                    <ProjectNavigation currentId={projectId} onNavigate={onNavigate} />

                    {/* Insertion du composant ContactSection en bas de chaque page projet */}
                    <ContactSection />
                </div>
            );
        }

        function AboutPage() {
            return (
                <>
                    <div className="min-h-screen flex flex-col items-center justify-center text-center px-6 py-24 md:py-20 gsap-fade-up">
                        <div className="max-w-2xl mx-auto">
                            <img 
                                src="assets/portrait.jpg" // Remplacez par l'URL de votre photo
                                alt="Charles Valentin" 
                                className="w-48 h-48 rounded-full mx-auto mb-8 border-4 border-accent"
                            />
                            <p className="text-2xl md:text-4xl font-medium leading-tight tracking-tight mt-16 mb-8">
                                Bonjour, je suis Charles, un designer UX/UI passionné par la création d'expériences numériques intuitives et esthétiques, transformant des problématiques complexes en interfaces évidentes.
                            </p>
                            <blockquote className="text-xl md:text-2xl italic text-neutral-400 border-l-4 border-accent pl-6 my-12">
                                "Le design n'est pas seulement ce à quoi ça ressemble et ce que l'on ressent. Le design est comment ça fonctionne."
                                <cite className="block not-italic text-base text-neutral-500 mt-2">— Steve Jobs</cite>
                            </blockquote>
                        </div>
                    </div>
                    <ContactSection />
                </>
            );
        }

        /**
         * Composant Header Mobile avec animations GSAP
         */
        function MobileHeader({ onNavigate, projects }) {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isProjectsOpen, setIsProjectsOpen] = useState(false);
            const menuRef = useRef();
            const itemsRef = useRef([]);

            // Animation d'ouverture/fermeture GSAP
            useLayoutEffect(() => {
                if (isMenuOpen) {
                    const ctx = gsap.context(() => {
                        // Animation du fond
                        gsap.fromTo(".mobile-overlay", 
                            { opacity: 0 }, 
                            { opacity: 1, duration: 0.4, ease: "power2.out" }
                        );
                        // Animation des items en cascade
                        gsap.fromTo(".mobile-nav-item", 
                            { y: 30, opacity: 0 }, 
                            { y: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: "power3.out", delay: 0.2 }
                        );
                    }, menuRef);
                    return () => ctx.revert();
                }
            }, [isMenuOpen]);

            useEffect(() => {
                document.body.style.overflow = isMenuOpen ? 'hidden' : 'auto';
                return () => document.body.style.overflow = 'auto';
            }, [isMenuOpen]);

            const handleNav = (view, id = null) => {
                onNavigate(view, id);
                setIsMenuOpen(false);
                setIsProjectsOpen(false);
            };

            const BurgerIcon = () => (<svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>);
            const CloseIcon = () => (<svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>);

            return (
                <div className="md:hidden" ref={menuRef}>
                    <div className="flex justify-between items-center p-4 relative z-[70] bg-[#1C1C1C]/80 backdrop-blur-sm border-b border-borderDark">
                        <div className="text-sm font-medium uppercase tracking-widest cursor-pointer" onClick={() => handleNav('landing')}>
                            Charles Valentin
                        </div>
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="focus:outline-none">
                            {isMenuOpen ? <CloseIcon /> : <BurgerIcon />}
                        </button>
                    </div>

                    {isMenuOpen && (
                        <div className="mobile-overlay fixed inset-0 bg-[#1C1C1C] z-[60] flex flex-col pt-32 px-6 overflow-y-auto">
                            <nav className="flex flex-col gap-8 items-center text-center pb-10">
                                <div className="mobile-nav-item">
                                    <a href="#" onClick={(e) => { e.preventDefault(); handleNav('landing'); }} className="text-4xl font-black uppercase tracking-tighter hover:text-accent">Accueil</a>
                                </div>
                                
                                <div className="mobile-nav-item w-full flex flex-col items-center">
                                    <button onClick={() => setIsProjectsOpen(!isProjectsOpen)} className="flex items-center justify-center gap-3 text-4xl font-black uppercase tracking-tighter hover:text-accent w-full">
                                        Projets <span className={`transition-transform duration-300 ${isProjectsOpen ? 'rotate-180' : ''} text-xl`}>▼</span>
                                    </button>
                                    <div className={`flex-col gap-5 mt-6 w-full overflow-hidden transition-all duration-500 ${isProjectsOpen ? 'max-h-[500px] opacity-100 flex' : 'max-h-0 opacity-0 hidden'}`}>
                                        {Object.entries(projects).map(([id, project]) => (
                                            <a key={id} href="#" onClick={(e) => { e.preventDefault(); handleNav('project', id); }} className="text-xl text-neutral-400 hover:text-white">{project.title}</a>
                                        ))}
                                    </div>
                                </div>

                                <div className="mobile-nav-item">
                                    <a href="#" onClick={(e) => { e.preventDefault(); handleNav('about'); }} className="text-4xl font-black uppercase tracking-tighter hover:text-accent">À propos</a>
                                </div>

                                <div className="mobile-nav-item mt-4">
                                    <a href="assets/portfolio.pdf" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center border-2 border-white text-white px-8 py-4 text-xl font-black uppercase tracking-tighter hover:bg-white hover:text-black">
                                        Portfolio
                                    </a>
                                </div>
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        /**
         * Header Principal (Desktop + Appel Mobile)
         */
        function Header({ onNavigate, projects }) {
            const [isProjectsOpen, setIsProjectsOpen] = useState(false);

            const handleNav = (view, id = null) => {
                onNavigate(view, id);
                setIsProjectsOpen(false);
            };

            return (
                <>
                    <MobileHeader onNavigate={onNavigate} projects={projects} />

                    <header className="hidden md:block sticky top-0 z-50 bg-[#1C1C1C]/80 backdrop-blur-sm border-b border-borderDark">
                        <div className="flex justify-between items-center p-6 max-w-screen-2xl mx-auto">
                            <div className="text-sm font-medium uppercase tracking-widest cursor-pointer hover:text-accent transition-colors" onClick={() => handleNav('landing')}>
                                Charles Valentin
                            </div>
                            <nav className="flex items-center gap-8">
                                <a href="#" onClick={(e) => { e.preventDefault(); handleNav('landing'); }} className="text-sm font-medium uppercase tracking-widest hover:text-accent">Accueil</a>
                                <div className="relative" onMouseEnter={() => setIsProjectsOpen(true)} onMouseLeave={() => setIsProjectsOpen(false)}>
                                    <button className="flex items-center gap-2 text-sm font-medium uppercase tracking-widest hover:text-accent">
                                       Projets <span className={`transition-transform ${isProjectsOpen ? 'rotate-180' : ''}`}>▼</span>
                                    </button>
                                    {isProjectsOpen && (
                                        <div className="absolute top-full left-0 border border-borderDark bg-[#1C1C1C] rounded-md py-2 w-64">
                                            {Object.entries(projects).map(([id, project]) => (
                                                <a key={id} href="#" onClick={(e) => { e.preventDefault(); handleNav('project', id); }} className="block px-4 py-2 text-sm text-white hover:bg-accent hover:text-black">
                                                    {project.title}
                                                </a>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <a href="#" onClick={(e) => { e.preventDefault(); handleNav('about'); }} className="text-sm font-medium uppercase tracking-widest hover:text-accent">À propos</a>
                                <a href="assets/portfolio.pdf" target="_blank" rel="noopener noreferrer" className="border-2 border-accent text-accent px-4 py-2 text-sm font-medium uppercase hover:bg-accent hover:text-black transition-colors">Portfolio</a>
                            </nav>
                        </div>
                    </header>
                </>
            );
        }

        function App() {
            const [currentView, setCurrentView] = useState({ view: 'landing', id: null });

            const handleNavigation = (view, id = null) => {
                window.scrollTo(0, 0);
                setCurrentView({ view, id });
            };

            const renderView = () => {
                switch (currentView.view) {
                    case 'project':
                        return (
                            <ProjectView 
                                project={projectsData[currentView.id]} 
                                projectId={currentView.id}
                                onNavigate={(projectId) => handleNavigation('project', projectId)}
                                onClose={() => handleNavigation('landing')} 
                            />
                        );
                    case 'about':
                        return <AboutPage />;
                    case 'landing':
                    default:
                        return <LandingPage onOpenProject={(projectId) => handleNavigation('project', projectId)} />;
                }
            };

            return (
                <div className="antialiased selection:bg-accent selection:text-black">
                    <Header 
                        onNavigate={handleNavigation}
                        projects={projectsData}
                    />
                    {renderView()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
